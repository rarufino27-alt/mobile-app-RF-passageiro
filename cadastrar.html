<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Nova Corrida</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>
body{
  font-family:system-ui;
  padding:15px;
  background:#0f172a;
  color:#fff;
}

h2{
  text-align:center;
}

input, select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #334155;
  background:#020617;
  color:#fff;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  color:#000;
}

.hidden{
  display:none;
}
</style>

</head>

<body>

<h2>🚗 Nova Corrida</h2>

<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">

<input id="valor" type="number" placeholder="Valor">

<!-- MOTORISTA -->
<select id="motorista">
  <option value="">Selecione o motorista</option>
</select>

<!-- STATUS -->
<select id="status">
  <option value="finalizada">Finalizada</option>
  <option value="cancelada">Cancelada</option>
</select>

<button onclick="salvar()">Salvar Corrida</button>

<script>

let motoristasMap = {}; // id → nome

async function carregarMotoristas(){

  const { data } = await window.supabaseClient
    .from("motoristas")
    .select("id, nome")
    .order("nome");

  const select = document.getElementById("motorista");

  data.forEach(m => {

    motoristasMap[m.id] = m.nome;

    const opt = document.createElement("option");
    opt.value = m.id; // 🔥 AQUI É O SEGREDO
    opt.innerText = m.nome;

    select.appendChild(opt);
  });

}

async function salvar(){

  const motorista_id = document.getElementById("motorista").value;

  if(!motorista_id){
    alert("Selecione o motorista");
    return;
  }

  const corrida = {
    motorista_id: motorista_id,
    origem: origem.value.trim(),
    destino: destino.value.trim(),
    valor: Number(valor.value),
    status: status.value,
    data: new Date().toISOString()
  };

  const { error } = await window.supabaseClient
    .from("corridas")
    .insert([corrida]);

  if(error){
    console.log(error);
    alert("Erro ao salvar");
    return;
  }

  alert("Corrida cadastrada com sucesso");
  location.reload();

}

carregarMotoristas();

</script>

</body>
</html>
