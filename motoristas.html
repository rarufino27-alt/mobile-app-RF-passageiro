<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Painel RF - Motoristas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
}

.header{
  padding:15px;
  background:#1e293b;
  text-align:center;
  font-weight:700;
  font-size:18px;
}

.container{
  padding:15px;
  max-width:600px;
  margin:auto;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  border:1px solid #334155;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #334155;
  background:#0f172a;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:700;
  margin-top:5px;
}

.btn-save{ background:#22c55e; color:#000; }
.btn-del{ background:#ef4444; color:#fff; }
.btn-edit{ background:#3b82f6; color:#fff; }

.small{
  font-size:13px;
  color:#94a3b8;
}

</style>

</head>

<body>

<div class="header">🚗 Motoristas</div>

<div class="container">

<!-- CADASTRO -->
<div class="card">

<h3 id="tituloForm">Cadastrar Motorista</h3>

<input id="nome" placeholder="Nome completo">
<input id="telefone" placeholder="Telefone">
<input id="endereco" placeholder="Endereço">

<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
<input id="cor" placeholder="Cor do veículo">
<input id="placa" placeholder="Placa">

<button class="btn-save" onclick="salvar()">Salvar</button>

</div>

<!-- LISTA -->
<div id="lista"></div>

</div>

<script>

let editandoId = null;

/* =========================
SALVAR / EDITAR
========================= */
async function salvar(){

  const data = {
    nome: nome.value.trim(),
    telefone: telefone.value.trim(),
    endereco: endereco.value.trim(),
    marca: marca.value.trim(),
    modelo: modelo.value.trim(),
    cor: cor.value.trim(),
    placa: placa.value.trim()
  };

  if(!data.nome || !data.telefone){
    alert("Preencha nome e telefone");
    return;
  }

  if(editandoId){

    const { error } = await window.supabaseClient
      .from("motoristas")
      .update(data)
      .eq("id", editandoId);

    if(error){
      console.log(error);
      alert("Erro ao atualizar");
      return;
    }

    alert("Motorista atualizado");

    editandoId = null;
    tituloForm.innerText = "Cadastrar Motorista";

  }else{

    const { error } = await window.supabaseClient
      .from("motoristas")
      .insert([data]);

    if(error){
      console.log(error);
      alert("Erro ao salvar");
      return;
    }

    alert("Motorista cadastrado");

  }

  limpar();
  carregar();
}

/* =========================
CARREGAR
========================= */
async function carregar(){

  const { data, error } = await window.supabaseClient
    .from("motoristas")
    .select("*")
    .order("nome");

  if(error){
    console.log(error);
    alert("Erro ao carregar");
    return;
  }

  lista.innerHTML = "";

  data.forEach(m => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${m.nome}</strong>

      <div class="small">📞 ${m.telefone}</div>
      <div class="small">📍 ${m.endereco || "-"}</div>

      <div class="small">🚗 ${m.marca || ""} ${m.modelo || ""}</div>
      <div class="small">🎨 ${m.cor || "-"}</div>
      <div class="small">🔖 ${m.placa || "-"}</div>

      <button class="btn-edit" onclick="editar(${JSON.stringify(m).replace(/"/g,'&quot;')})">
        Editar
      </button>

      <button class="btn-del" onclick="excluir('${m.id}')">
        Excluir
      </button>
    `;

    lista.appendChild(div);

  });

}

/* =========================
EDITAR
========================= */
function editar(m){

  editandoId = m.id;

  nome.value = m.nome || "";
  telefone.value = m.telefone || "";
  endereco.value = m.endereco || "";

  marca.value = m.marca || "";
  modelo.value = m.modelo || "";
  cor.value = m.cor || "";
  placa.value = m.placa || "";

  tituloForm.innerText = "Editando Motorista";

  window.scrollTo({ top:0, behavior:"smooth" });
}

/* =========================
EXCLUIR
========================= */
async function excluir(id){

  if(!confirm("Excluir motorista?")) return;

  const { error } = await window.supabaseClient
    .from("motoristas")
    .delete()
    .eq("id", id);

  if(error){
    console.log(error);
    alert("Erro ao excluir");
    return;
  }

  carregar();
}

/* =========================
LIMPAR
========================= */
function limpar(){
  nome.value = "";
  telefone.value = "";
  endereco.value = "";
  marca.value = "";
  modelo.value = "";
  cor.value = "";
  placa.value = "";
}

/* START */
carregar();

</script>

</body>
</html>
