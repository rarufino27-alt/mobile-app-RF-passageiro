<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF Passageiro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>

<style>

:root{
--rf-gold:#D6B85F;
--rf-gold-strong:#F4D97A;
--rf-bg:#070910;
--rf-panel:#0E1320;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background: radial-gradient(circle at top,#161D2E,#070910 75%);
color:#fff;
overflow-x:hidden;
transition:.25s;
}

/* HEADER */

.header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(214,184,95,.25);
}

.logo{
font-weight:900;
font-size:22px;
color:var(--rf-gold-strong);
letter-spacing:2px;
}

.status{
font-size:12px;
opacity:.7;
}

/* HERO */

.hero{
padding:22px;
font-size:30px;
font-weight:900;
line-height:1.2;
letter-spacing:.5px;
}

/* HERO VISUAL */

.hero-visual{
position:relative;
height:240px;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.hero-slide{
position:absolute;
inset:0;
opacity:0;
transition:opacity 1s ease;
}

.hero-slide.active{
opacity:1;
}

.hero-slide img{
width:100%;
height:100%;
object-fit:cover;
}

.hero-slide::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
to bottom,
rgba(0,0,0,.15),
rgba(0,0,0,.75)
);
}

/* INDICADORES */

.slider-dots{
position:absolute;
bottom:10px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:8px;
z-index:5;
}

.dot-ind{
width:8px;
height:8px;
border-radius:50%;
background:rgba(255,255,255,.35);
transition:.3s;
}

.dot-ind.active{
background:var(--rf-gold);
transform:scale(1.3);
}

/* PANEL */

.panel{
position:fixed;
bottom:0;
width:100%;
background:linear-gradient(180deg,#0F1422,#06080E);
border-top-left-radius:28px;
border-top-right-radius:28px;
padding:24px;
border-top:1px solid rgba(214,184,95,.35);
box-shadow:0 -10px 40px rgba(0,0,0,.8);
}

.panel-inner{
max-width:420px;
margin:auto;
display:flex;
flex-direction:column;
gap:14px;
}

/* BOX */

.box{
background:#12192A;
border:1px solid rgba(214,184,95,.25);
padding:16px;
border-radius:14px;
display:flex;
align-items:center;
gap:12px;
font-size:15px;
cursor:pointer;
position:relative;
}

.box::before{
content:"";
position:absolute;
left:0;
top:0;
bottom:0;
width:3px;
background:linear-gradient(var(--rf-gold),transparent);
border-radius:3px;
opacity:.6;
}

/* DOTS */

.dot{
width:10px;
height:10px;
border-radius:50%;
}

.origem{background:#22c55e;}
.parada{background:#3b82f6;}
.destino{background:#ef4444;}

/* PLUS */

.plus{
width:40px;
height:40px;
border-radius:50%;
background:linear-gradient(135deg,var(--rf-gold),var(--rf-gold-strong));
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:800;
margin:auto;
cursor:pointer;
box-shadow:0 0 14px rgba(214,184,95,.6);
}

/* OPTIONS */

.options{
display:none;
flex-direction:column;
gap:10px;
}

.option{
padding:12px;
border-radius:12px;
background:#12192A;
border:1px solid rgba(255,255,255,.08);
text-align:center;
cursor:pointer;
font-size:14px;
}

.option.active{
border-color:var(--rf-gold);
background:rgba(214,184,95,.2);
}

/* MULTI */

.multi{
display:flex;
gap:10px;
}

/* PRICE */

.price{
display:none;
padding:16px;
border-radius:16px;
background:rgba(214,184,95,.18);
text-align:center;
border:1px solid rgba(214,184,95,.3);
}

.price strong{
font-size:22px;
color:var(--rf-gold-strong);
}

/* BUTTON */

button{
padding:18px;
border-radius:50px;
border:none;
background:linear-gradient(135deg,var(--rf-gold),var(--rf-gold-strong));
font-weight:900;
font-size:16px;
cursor:pointer;
letter-spacing:.5px;
box-shadow:0 10px 30px rgba(214,184,95,.35);
}

button:disabled{
opacity:.35;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#0E1320;
width:90%;
max-width:380px;
border-radius:16px;
padding:20px;
max-height:80vh;
overflow:auto;
}

.modal-content div{
padding:12px;
border-radius:10px;
cursor:pointer;
}

.modal-content div:hover{
background:rgba(255,255,255,.08);
}

</style>
</head>

<body>

<div class="header">
<div class="logo">RF</div>
<div class="status">Passageiro</div>
</div>

<div class="hero">
Para onde vamos hoje?
</div>

<div class="hero-visual">

<div class="hero-slide active">
<img src="img/slide1.jpg">
</div>

<div class="hero-slide">
<img src="img/slide2.jpg">
</div>

<div class="hero-slide">
<img src="img/slide3.jpg">
</div>

<div class="slider-dots">
<span class="dot-ind active"></span>
<span class="dot-ind"></span>
<span class="dot-ind"></span>
</div>

</div>

<div class="panel">

<div class="panel-inner">

<div class="box" id="origemBtn">
<div class="dot origem"></div>
<div id="origemTexto">Selecionar origem</div>
</div>

<div class="plus" id="plusBtn" style="display:none">+</div>

<div class="box" id="paradaBtn" style="display:none">
<div class="dot parada"></div>
<div id="paradaTexto">Selecionar parada</div>
</div>

<div class="box" id="destinoBtn" style="display:none">
<div class="dot destino"></div>
<div id="destinoTexto">Selecionar destino</div>
</div>

<div class="options" id="optionsBox">

<div class="option" id="desvioBtn">
Desvio simples (+R$5)
</div>

<div class="option" id="mercadoBtn">
🛒 Saída mercado (+R$3,89)
</div>

<div class="multi">

<div class="option" id="carro6Btn">
🚐 6 lugares (+50%)
</div>

<div class="option" id="excessoBtn">
👥 Excesso (+50%)
</div>

</div>

</div>

<div class="price" id="precoBox">
Total estimado<br>
<strong id="precoValor">R$ 0,00</strong>
</div>

<button id="confirmar" disabled>
Buscar motorista
</button>

</div>
</div>

<div class="modal" id="modal">
<div class="modal-content" id="lista"></div>
</div>

<script>

/* HERO SLIDER */

const heroSlides=document.querySelectorAll(".hero-slide");
const dots=document.querySelectorAll(".dot-ind");

let heroIndex=0;

function showSlide(i){

heroSlides.forEach(s=>s.classList.remove("active"));
dots.forEach(d=>d.classList.remove("active"));

heroSlides[i].classList.add("active");
dots[i].classList.add("active");

}

function nextSlide(){

heroIndex++;

if(heroIndex>=heroSlides.length){
heroIndex=0;
}

showSlide(heroIndex);

}

setInterval(nextSlide,5000);

/* SWIPE */

let startX=0;

const slider=document.querySelector(".hero-visual");

slider.addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX;
});

slider.addEventListener("touchend",(e)=>{

let endX=e.changedTouches[0].clientX;

if(startX-endX>50){

heroIndex++;
if(heroIndex>=heroSlides.length) heroIndex=0;

showSlide(heroIndex);

}

if(endX-startX>50){

heroIndex--;
if(heroIndex<0) heroIndex=heroSlides.length-1;

showSlide(heroIndex);

}

});

/* RESTANTE DO SEU SCRIPT ORIGINAL */

const origemBtn=document.getElementById("origemBtn");
const destinoBtn=document.getElementById("destinoBtn");
const paradaBtn=document.getElementById("paradaBtn");
const plusBtn=document.getElementById("plusBtn");

const origemTexto=document.getElementById("origemTexto");
const destinoTexto=document.getElementById("destinoTexto");
const paradaTexto=document.getElementById("paradaTexto");

const precoBox=document.getElementById("precoBox");
const precoValor=document.getElementById("precoValor");
const confirmar=document.getElementById("confirmar");

const optionsBox=document.getElementById("optionsBox");

const desvioBtn=document.getElementById("desvioBtn");
const mercadoBtn=document.getElementById("mercadoBtn");
const carro6Btn=document.getElementById("carro6Btn");
const excessoBtn=document.getElementById("excessoBtn");

const modal=document.getElementById("modal");
const lista=document.getElementById("lista");

let origem=null;
let destino=null;
let parada=null;

let usarParada=false;
let desvio=false;
let mercado=false;
let carro6=false;
let excesso=false;

async function iniciar(){
if(window.DataManager){
await DataManager.carregarOrigens();
}
}
iniciar();

function calcular(base){

if(desvio) base+=5;
if(mercado) base+=3.89;

let mult=(carro6||excesso)?1.5:1;

return Number((base*mult).toFixed(2));
}

function recalcular(){

if(!origem||!destino){
confirmar.disabled=true;
precoBox.style.display="none";
return;
}

let base=0;

if(usarParada&&parada){
base=(DataManager.buscarValor(origem,parada)||0)
+(DataManager.buscarValor(parada,destino)||0);
}else{
base=DataManager.buscarValor(origem,destino)||0;
}

const total=calcular(base);

precoValor.innerText="R$ "+total.toFixed(2);
precoBox.style.display="block";
confirmar.disabled=false;

}

async function abrir(tipo){

modal.style.display="flex";
lista.innerHTML="";

let dados=[];

if(tipo==="origem") dados=await DataManager.carregarOrigens();
if(tipo==="destino"||tipo==="parada") dados=DataManager.listarDestinos(origem);

dados.forEach(item=>{

const d=document.createElement("div");
d.innerText=item;

d.onclick=()=>{

if(tipo==="origem"){
origem=item;
origemTexto.innerText=item;
destinoBtn.style.display="flex";
plusBtn.style.display="flex";
}

if(tipo==="destino"){
destino=item;
destinoTexto.innerText=item;
optionsBox.style.display="flex";
}

if(tipo==="parada"){
parada=item;
paradaTexto.innerText=item;
}

modal.style.display="none";
recalcular();

};

lista.appendChild(d);

});

}

origemBtn.onclick=()=>abrir("origem");
destinoBtn.onclick=()=>abrir("destino");
paradaBtn.onclick=()=>abrir("parada");

plusBtn.onclick=()=>{
usarParada=!usarParada;
paradaBtn.style.display=usarParada?"flex":"none";
};

desvioBtn.onclick=()=>{
desvio=!desvio;
desvioBtn.classList.toggle("active");
recalcular();
};

mercadoBtn.onclick=()=>{
mercado=!mercado;
mercadoBtn.classList.toggle("active");
recalcular();
};

carro6Btn.onclick=()=>{
carro6=true;
excesso=false;
carro6Btn.classList.add("active");
excessoBtn.classList.remove("active");
recalcular();
};

excessoBtn.onclick=()=>{
excesso=true;
carro6=false;
excessoBtn.classList.add("active");
carro6Btn.classList.remove("active");
recalcular();
};

confirmar.onclick=()=>{

localStorage.setItem("rf_corrida_temp",JSON.stringify({
origem,
destino,
parada:usarParada?parada:null
}));

document.body.style.opacity="0";

setTimeout(()=>{
window.location.href="procurando.html";
},250);

};

modal.onclick=(e)=>{
if(e.target===modal) modal.style.display="none";
};

</script>

</body>
</html>
