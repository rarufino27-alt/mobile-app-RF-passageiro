<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF Passageiro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="core/datamanager.js"></script>

<style>

:root{
--rf-gold:#D6B85F;
--rf-gold-strong:#F4D97A;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background: radial-gradient(circle at top,#1A2133 0%,#080A12 70%);
color:#fff;
overflow-x:hidden;
}

.header{
padding:20px;
font-weight:700;
font-size:15px;
letter-spacing:.5px;
}

.hero{
padding:0 20px;
font-size:26px;
font-weight:800;
margin-bottom:10px;
}

.slide-area{
padding:10px 20px 30px 20px;
display:flex;
justify-content:center;
}

.slide-card{
width:100%;
max-width:600px;
height:220px;
border-radius:20px;
overflow:hidden;
border:1px solid rgba(214,184,95,.35);
box-shadow:0 0 40px rgba(214,184,95,.25);
}

.slide-card img{
width:100%;
height:100%;
object-fit:cover;
transition:opacity .4s ease;
}

.card{
position:fixed;
bottom:0;
width:100%;
background:linear-gradient(180deg,#151B2B,#0C101B);
border-top-left-radius:32px;
border-top-right-radius:32px;
padding:25px;
box-shadow:0 -25px 60px rgba(0,0,0,.9);
}

.card-inner{
max-width:420px;
margin:auto;
display:flex;
flex-direction:column;
gap:14px;
}

.input-box{
background:#1C2333;
padding:15px;
border-radius:16px;
display:flex;
align-items:center;
gap:12px;
cursor:pointer;
font-size:15px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
}

.origem{background:#22c55e;}
.parada{background:#3b82f6;}
.destino{background:#ef4444;}

.plus-btn{
width:44px;
height:44px;
border-radius:50%;
background:linear-gradient(135deg,var(--rf-gold),var(--rf-gold-strong));
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:700;
margin:auto;
cursor:pointer;
box-shadow:0 0 25px rgba(214,184,95,.5);
}

.option-btn,
.radio-option{
padding:14px;
border-radius:16px;
background:#1C2333;
border:1px solid rgba(255,255,255,.08);
text-align:center;
cursor:pointer;
font-size:14px;
}

.option-btn.active,
.radio-option.active{
border-color:var(--rf-gold);
background:rgba(214,184,95,.2);
}

.radio-group{
display:flex;
gap:10px;
}

.preco{
padding:16px;
border-radius:18px;
background:rgba(214,184,95,.2);
text-align:center;
font-size:15px;
display:none;
}

.preco strong{
font-size:18px;
color:var(--rf-gold-strong);
}

button{
padding:18px;
border:none;
border-radius:50px;
background:linear-gradient(135deg,var(--rf-gold),var(--rf-gold-strong));
font-weight:700;
font-size:15px;
cursor:pointer;
}

button:disabled{
opacity:.4;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#111522;
width:90%;
max-width:400px;
border-radius:20px;
padding:15px;
max-height:80vh;
overflow:auto;
}

.modal-search{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:12px;
border:none;
background:#1C2333;
color:#fff;
}

.modal-item{
padding:12px;
border-radius:12px;
cursor:pointer;
}

.modal-item:hover{
background:rgba(255,255,255,.08);
}

</style>
</head>

<body>

<div class="header">PASSAGEIRO RF</div>
<div class="hero">Para onde vamos?</div>

<div class="slide-area">
<div class="slide-card">
<img id="slideImg" src="img/slide1.jpg">
</div>
</div>

<div class="card">
<div class="card-inner">

<div class="input-box" id="origemBtn">
<div class="dot origem"></div>
<div id="origemTexto">Selecionar origem</div>
</div>

<div class="plus-btn" id="plusBtn">+</div>

<div class="input-box" id="paradaBtn" style="display:none;">
<div class="dot parada"></div>
<div id="paradaTexto">Selecionar parada</div>
</div>

<div class="input-box" id="destinoBtn">
<div class="dot destino"></div>
<div id="destinoTexto">Selecionar destino</div>
</div>

<div class="preco" id="precoBox">
Total estimado<br>
<strong id="precoValor">R$ 0,00</strong>
</div>

<button id="confirmar" disabled>Buscar Motorista</button>

</div>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<input id="busca" class="modal-search" placeholder="Buscar local...">

<div id="lista"></div>

</div>
</div>

<script>

/* CARREGAR ROTAS */

let carregado=false;

async function iniciar(){
await DataManager.carregarOrigens();
carregado=true;
}

iniciar();

/* SLIDES */

const slides=["img/slide1.jpg","img/slide2.jpg","img/slide3.jpg"];
let slideIndex=0;
const slideImg=document.getElementById("slideImg");

setInterval(()=>{
slideIndex=(slideIndex+1)%slides.length;
slideImg.style.opacity=0;
setTimeout(()=>{
slideImg.src=slides[slideIndex];
slideImg.style.opacity=1;
},250);
},4000);

/* ELEMENTOS */

const modal=document.getElementById("modal");
const lista=document.getElementById("lista");
const busca=document.getElementById("busca");

const origemBtn=document.getElementById("origemBtn");
const destinoBtn=document.getElementById("destinoBtn");
const paradaBtn=document.getElementById("paradaBtn");
const plusBtn=document.getElementById("plusBtn");

const origemTexto=document.getElementById("origemTexto");
const destinoTexto=document.getElementById("destinoTexto");
const paradaTexto=document.getElementById("paradaTexto");

const precoBox=document.getElementById("precoBox");
const precoValor=document.getElementById("precoValor");

let origem=null;
let destino=null;
let parada=null;
let usarParada=false;

let tipoAtual=null;
let dadosAtuais=[];

/* CALCULAR */

function recalcular(){

if(!origem || !destino){
precoBox.style.display="none";
return;
}

let base=0;

if(usarParada && parada){

base=(DataManager.buscarValor(origem,parada)||0)
+(DataManager.buscarValor(parada,destino)||0);

}else{

base=DataManager.buscarValor(origem,destino)||0;

}

precoValor.innerText="R$ "+base.toFixed(2);
precoBox.style.display="block";

}

/* ABRIR MODAL */

async function abrir(tipo){

if(!carregado){
alert("Carregando rotas...");
return;
}

tipoAtual=tipo;

modal.style.display="flex";
busca.value="";

if(tipo==="origem"){
dadosAtuais=await DataManager.carregarOrigens();
}

if(tipo==="destino" || tipo==="parada"){

if(!origem){
alert("Selecione origem primeiro");
return;
}

dadosAtuais=DataManager.listarDestinos(origem);

}

renderLista(dadosAtuais);

}

/* RENDER LISTA */

function renderLista(listaDados){

lista.innerHTML="";

listaDados.forEach(item=>{

const d=document.createElement("div");
d.className="modal-item";
d.innerText=item;

d.onclick=()=>{

if(tipoAtual==="origem"){
origem=item;
origemTexto.innerText=item;
destino=null;
destinoTexto.innerText="Selecionar destino";
}

if(tipoAtual==="destino"){
destino=item;
destinoTexto.innerText=item;
}

if(tipoAtual==="parada"){
parada=item;
paradaTexto.innerText=item;
}

modal.style.display="none";

recalcular();

};

lista.appendChild(d);

});

}

/* BUSCA */

busca.addEventListener("input",()=>{

const termo=busca.value.toLowerCase();

const filtrado=dadosAtuais.filter(l=>
l.toLowerCase().includes(termo)
);

renderLista(filtrado);

});

/* EVENTOS */

origemBtn.onclick=()=>abrir("origem");
destinoBtn.onclick=()=>abrir("destino");
paradaBtn.onclick=()=>abrir("parada");

plusBtn.onclick=()=>{
usarParada=!usarParada;
paradaBtn.style.display=usarParada?"flex":"none";
recalcular();
};

modal.onclick=(e)=>{
if(e.target===modal){
modal.style.display="none";
}
};

</script>

</body>
</html>
