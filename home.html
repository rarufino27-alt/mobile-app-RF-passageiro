<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RF Passageiro</title>

<script src="core/datamanager.js"></script>

<style>

:root{
--rf-gold:#D6B85F;
--rf-gold-strong:#F4D97A;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background: radial-gradient(circle at top,#151B2B,#05070D 80%);
color:white;
overflow:hidden;
}

/* HEADER */

.header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(214,184,95,.2);
}

.logo{
font-size:22px;
font-weight:800;
color:var(--rf-gold);
letter-spacing:1px;
}

.status{
font-size:12px;
opacity:.7;
}

/* RADAR */

.radar-area{
height:300px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.radar{
width:260px;
height:260px;
border-radius:50%;
border:2px solid rgba(214,184,95,.5);
position:absolute;
}

.radar::before,
.radar::after{
content:"";
position:absolute;
inset:0;
border-radius:50%;
border:2px solid rgba(214,184,95,.2);
animation:pulse 4s infinite;
}

.radar::after{animation-delay:2s;}

@keyframes pulse{
0%{transform:scale(.7);opacity:.8;}
100%{transform:scale(1.8);opacity:0;}
}

.center-dot{
width:14px;
height:14px;
background:var(--rf-gold);
border-radius:50%;
box-shadow:0 0 15px var(--rf-gold);
z-index:3;
}

/* FUTURISTIC PANEL */

.panel{
position:fixed;
bottom:0;
width:100%;
background:linear-gradient(180deg,#0E1320,#06080F);
border-top:2px solid rgba(214,184,95,.3);
border-top-left-radius:28px;
border-top-right-radius:28px;
padding:24px;
}

.panel-inner{
max-width:420px;
margin:auto;
display:flex;
flex-direction:column;
gap:14px;
}

/* HUD BOX */

.hud-box{
background:#101623;
border:1px solid rgba(214,184,95,.25);
padding:16px;
border-radius:14px;
display:flex;
align-items:center;
gap:10px;
font-size:15px;
cursor:pointer;
position:relative;
}

.hud-box::after{
content:"";
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
width:6px;
height:6px;
border-right:2px solid var(--rf-gold);
border-bottom:2px solid var(--rf-gold);
transform:rotate(-45deg);
}

/* DOTS */

.dot{
width:10px;
height:10px;
border-radius:50%;
}

.origem{background:#22c55e;}
.destino{background:#ef4444;}
.parada{background:#3b82f6;}

/* PRICE */

.price{
text-align:center;
padding:18px;
background:rgba(214,184,95,.15);
border-radius:16px;
font-size:16px;
display:none;
}

.price strong{
color:var(--rf-gold-strong);
font-size:22px;
}

/* BUTTON */

.btn{
padding:18px;
border-radius:50px;
background:linear-gradient(135deg,var(--rf-gold),var(--rf-gold-strong));
border:none;
font-weight:800;
font-size:16px;
cursor:pointer;
}

.btn:disabled{
opacity:.3;
}

/* OPTIONS */

.option{
padding:12px;
border-radius:12px;
background:#101623;
border:1px solid rgba(255,255,255,.06);
text-align:center;
cursor:pointer;
font-size:13px;
}

.option.active{
border-color:var(--rf-gold);
background:rgba(214,184,95,.15);
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#0E1320;
width:90%;
max-width:380px;
border-radius:16px;
padding:20px;
max-height:80vh;
overflow:auto;
}

.modal-content div{
padding:12px;
border-radius:10px;
cursor:pointer;
}

.modal-content div:hover{
background:rgba(255,255,255,.08);
}

</style>
</head>

<body>

<div class="header">
<div class="logo">RF</div>
<div class="status">Passageiro</div>
</div>


<div class="radar-area">

<div class="radar"></div>

<div class="center-dot"></div>

</div>


<div class="panel">

<div class="panel-inner">

<div class="hud-box" id="origemBtn">
<div class="dot origem"></div>
<div id="origemTexto">Selecionar origem</div>
</div>

<div class="hud-box" id="destinoBtn">
<div class="dot destino"></div>
<div id="destinoTexto">Selecionar destino</div>
</div>

<div class="option" id="desvioBtn">Desvio simples +R$5</div>

<div class="option" id="mercadoBtn">🛒 Saída mercado +R$3,89</div>

<div class="price" id="precoBox">

Total estimado<br>
<strong id="precoValor">R$ 0,00</strong>

</div>

<button class="btn" id="confirmar" disabled>
Buscar motorista
</button>

</div>

</div>


<div class="modal" id="modal">

<div class="modal-content" id="lista"></div>

</div>

<script>

/* DOM */

const origemBtn = document.getElementById("origemBtn");
const destinoBtn = document.getElementById("destinoBtn");
const origemTexto = document.getElementById("origemTexto");
const destinoTexto = document.getElementById("destinoTexto");
const precoBox = document.getElementById("precoBox");
const precoValor = document.getElementById("precoValor");
const confirmar = document.getElementById("confirmar");
const modal = document.getElementById("modal");
const lista = document.getElementById("lista");

let origem=null;
let destino=null;

async function iniciar(){
if(window.DataManager){
await DataManager.carregarOrigens();
}
}

iniciar();

function recalcular(){

if(!origem || !destino){
confirmar.disabled=true;
precoBox.style.display="none";
return;
}

let valor=DataManager.buscarValor(origem,destino)||0;

precoValor.innerText="R$ "+valor.toFixed(2);

precoBox.style.display="block";

confirmar.disabled=false;

}

async function abrir(tipo){

modal.style.display="flex";
lista.innerHTML="";

let dados=[];

if(tipo==="origem") dados=await DataManager.carregarOrigens();
if(tipo==="destino") dados=DataManager.listarDestinos(origem);

dados.forEach(item=>{

const d=document.createElement("div");

d.innerText=item;

d.onclick=()=>{

if(tipo==="origem"){
origem=item;
origemTexto.innerText=item;
destino=null;
destinoTexto.innerText="Selecionar destino";
}

if(tipo==="destino"){
destino=item;
destinoTexto.innerText=item;
}

modal.style.display="none";

recalcular();

};

lista.appendChild(d);

});

}

origemBtn.onclick=()=>abrir("origem");
destinoBtn.onclick=()=>abrir("destino");

confirmar.onclick=()=>{

localStorage.setItem("rf_corrida_temp",JSON.stringify({
origem,
destino
}));

window.location.href="procurando.html";

};

modal.onclick=(e)=>{
if(e.target===modal) modal.style.display="none";
};

</script>

</body>
</html>
