<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Passageiros RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>

<style>
body{
  font-family:system-ui;
  margin:0;
  background:#111;
  color:#fff;
}

.container{
  padding:15px;
}

h1{
  text-align:center;
}

/* BUSCA */
input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:none;
}

/* CARD */
.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.small{
  font-size:13px;
  opacity:0.7;
}

.btn{
  margin-top:8px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#facc15;
}
</style>

</head>

<body>

<div class="container">

<h1>📱 Passageiros</h1>

<input id="busca" placeholder="Buscar por nome ou telefone">

<div id="lista"></div>

</div>

<script>

function carregar(){

  const data = DataManager.get();
  const lista = document.getElementById("lista");

  const termo = document.getElementById("busca").value.toLowerCase();

  lista.innerHTML = "";

  // AGRUPAR PASSAGEIROS
  const mapa = {};

  data.corridas.forEach(c => {

    if(!mapa[c.telefone]){
      mapa[c.telefone] = {
        nome: c.solicitante,
        telefone: c.telefone,
        total: 0,
        grupo: c.grupo
      };
    }

    mapa[c.telefone].total++;

  });

  const arr = Object.values(mapa)
    .sort((a,b) => b.total - a.total);

  arr.forEach(p => {

    if(termo &&
      !p.nome.toLowerCase().includes(termo) &&
      !p.telefone.includes(termo)){
      return;
    }

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="top">
        <span>${p.nome}</span>
        <span>${p.total} viagens</span>
      </div>

      <div class="small">📞 ${p.telefone}</div>
      <div class="small">📍 ${p.grupo}</div>

      <button class="btn" onclick="detalhes('${p.telefone}')">
        Ver histórico
      </button>
    `;

    lista.appendChild(div);

  });

}

document.getElementById("busca").addEventListener("input", carregar);

/* DETALHES */
function detalhes(telefone){

  const data = DataManager.get();

  const corridas = data.corridas.filter(c => c.telefone === telefone);

  let texto = `📱 Histórico\n\n`;

  corridas.forEach(c => {
    texto += `${c.origem} → ${c.destino} | R$ ${c.valor} | ${c.motorista}\n`;
  });

  alert(texto);

}

carregar();

</script>

</body>
</html>
