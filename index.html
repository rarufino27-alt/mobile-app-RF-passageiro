<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RF - Inicializando</title>

<style>
body{
  margin:0;
  height:100vh;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family: Arial, sans-serif;
  color:#fff;
}

/* FUNDO ANIMADO */
.bg-lines{
  position:absolute;
  width:200%;
  height:200%;
  background: linear-gradient(transparent 95%, rgba(255,215,0,0.05) 100%);
  background-size: 100px 100px;
  animation: moveBg 10s linear infinite;
}

@keyframes moveBg{
  from{transform: translateY(0);}
  to{transform: translateY(-100px);}
}

/* CONTAINER */
.container{
  text-align:center;
  position:relative;
}

/* LOGO */
.logo{
  font-size:60px;
  font-weight:bold;
  letter-spacing:6px;
  color:#fff;
  opacity:0;
  transform:scale(0.8);
  animation: logoIn 1s ease forwards 0.5s;
  position:relative;
}

/* ANIMAÇÃO LOGO */
@keyframes logoIn{
  to{
    opacity:1;
    transform:scale(1);
  }
}

/* BRILHO DOURADO */
.logo::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background: linear-gradient(120deg, transparent, rgba(255,215,0,0.8), transparent);
  top:0;
  left:-100%;
  animation: shine 2s ease-in-out infinite 1s;
}

@keyframes shine{
  to{
    left:100%;
  }
}

/* TEXTO */
.text{
  margin-top:20px;
  font-size:14px;
  color:#FFD700;
  opacity:0;
  animation: fadeText 1s forwards 1.5s;
}

/* STATUS */
.status{
  margin-top:10px;
  font-size:12px;
  color:#aaa;
}

/* PONTINHOS */
.dots::after{
  content:"";
  animation: dots 1.5s steps(3, end) infinite;
}

@keyframes dots{
  0%{content:"";}
  33%{content:".";}
  66%{content:"..";}
  100%{content:"...";}
}

@keyframes fadeText{
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="bg-lines"></div>

<div class="container">
  <div class="logo">RF</div>
  <div class="text">Inicializando sistema</div>
  <div class="status dots"></div>
</div>

<script>
// TEMPO TOTAL DA SPLASH (ms)
const splashTime = 2800;

// REDIRECIONAMENTO
setTimeout(()=>{
  window.location.href = "dashboard.html";
}, splashTime);
</script>

</body>
</html>
