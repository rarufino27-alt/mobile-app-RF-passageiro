<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Relatórios RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  font-family:system-ui;
  margin:0;
  background:#0f172a;
  color:#fff;
}

.header{
  padding:15px;
  text-align:center;
  background:#1e293b;
  font-weight:700;
}

.container{
  padding:15px;
  max-width:700px;
  margin:auto;
}

select{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border-radius:8px;
  background:#020617;
  color:#fff;
  border:1px solid #334155;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  border:1px solid #334155;
}

.title{
  font-weight:700;
  margin-bottom:8px;
}

.small{
  font-size:13px;
  color:#94a3b8;
}

</style>

</head>

<body>

<div class="header">📊 Relatórios</div>

<div class="container">

<select id="periodo" onchange="carregar()">
  <option value="geral">Geral</option>
  <option value="semana">Semana (Seg–Sáb)</option>
  <option value="domingo">Domingo</option>
  <option value="mes">Mês atual</option>
</select>

<div id="resumo"></div>
<div id="motoristas"></div>
<div id="grupos"></div>

</div>

<script>

function filtrarPeriodo(dados){

  const tipo = document.getElementById("periodo").value;
  const hoje = new Date();

  return dados.filter(c => {

    const data = new Date(c.data);

    if(tipo === "mes"){
      return data.getMonth() === hoje.getMonth() &&
             data.getFullYear() === hoje.getFullYear();
    }

    if(tipo === "domingo"){
      return data.getDay() === 0;
    }

    if(tipo === "semana"){
      const dia = data.getDay();
      return dia >= 1 && dia <= 6;
    }

    return true;

  });

}

async function carregar(){

  const { data, error } = await window.supabaseClient
    .from("corridas")
    .select(`
      *,
      motoristas ( nome )
    `);

  if(error){
    alert("Erro ao carregar");
    return;
  }

  const filtrado = filtrarPeriodo(data);

  renderResumo(filtrado);
  renderMotoristas(filtrado);
  renderGrupos(filtrado);

}

function renderResumo(data){

  let total = data.length;
  let faturamento = 0;

  data.forEach(c => {
    if(c.status === "finalizada"){
      faturamento += c.valor;
    }
  });

  const media = total ? faturamento / total : 0;

  document.getElementById("resumo").innerHTML = `
    <div class="card">
      <div class="title">Resumo</div>
      <div>Total de corridas: ${total}</div>
      <div>Faturamento: R$ ${faturamento.toFixed(2)}</div>
      <div>Média por corrida: R$ ${media.toFixed(2)}</div>
    </div>
  `;

}

function renderMotoristas(data){

  const map = {};

  data.forEach(c => {

    const nome = c.motoristas?.nome || "Sem nome";

    if(!map[nome]){
      map[nome] = { total:0, valor:0 };
    }

    if(c.status === "finalizada"){
      map[nome].total++;
      map[nome].valor += c.valor;
    }

  });

  const arr = Object.entries(map)
    .sort((a,b)=> b[1].total - a[1].total);

  let html = `<div class="card"><div class="title">Por Motorista</div>`;

  arr.forEach(([nome, d]) => {
    html += `
      <div>${nome} — ${d.total} corridas (R$ ${d.valor.toFixed(2)})</div>
    `;
  });

  html += `</div>`;

  document.getElementById("motoristas").innerHTML = html;

}

function renderGrupos(data){

  const map = {};

  data.forEach(c => {

    if(!map[c.grupo]){
      map[c.grupo] = {
        total:0,
        valor:0,
        canceladas:0
      };
    }

    map[c.grupo].total++;

    if(c.status === "finalizada"){
      map[c.grupo].valor += c.valor;
    }else{
      map[c.grupo].canceladas++;
    }

  });

  let html = `<div class="card"><div class="title">Por Grupo</div>`;

  for(let g in map){

    const m = map[g];
    const media = m.total ? m.valor / m.total : 0;

    html += `
      <div>
        <strong>${g}</strong><br>
        Corridas: ${m.total} | R$ ${m.valor.toFixed(2)}<br>
        Média: R$ ${media.toFixed(2)}<br>
        Canceladas: ${m.canceladas}
      </div><br>
    `;
  }

  html += `</div>`;

  document.getElementById("grupos").innerHTML = html;

}

carregar();

</script>

</body>
</html>
