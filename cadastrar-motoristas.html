<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>RF – Cadastro Motorista</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

/* BASE */
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#e5e7eb;
}

/* HEADER */
.top-white{
  display:flex;
  align-items:center;
  padding:14px;
  background:#1e293b;
  border-bottom:1px solid #334155;
  font-weight:700;
}

/* CONTAINER */
.app-container{
  padding:14px;
  max-width:600px;
  margin:auto;
}

/* CARD */
.card-modern{
  background:#1e293b;
  border:1px solid #334155;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

/* INPUT */
.input-box{
  padding:14px;
  border-radius:10px;
  margin-bottom:10px;
  background:#020617;
  border:1px solid #334155;
  color:#fff;
}

/* LABEL */
.label{
  font-size:13px;
  opacity:.7;
  margin-bottom:6px;
}

/* GRID VEÍCULO */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* MOBILE AJUSTE AUTOMÁTICO */
@media(max-width:480px){
  .grid{
    grid-template-columns:1fr;
  }
}

/* BOTÃO FIXO */
.cta-box{
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  background:#020617;
  border-top:1px solid #334155;
}

.cta-box button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  font-weight:bold;
  font-size:16px;
  color:#000;
}

/* SMALL */
.small{
  font-size:13px;
  color:#94a3b8;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="top-white">
  🚗 Cadastro de Motorista
</div>

<div class="app-container">

<!-- DADOS PESSOAIS -->
<div class="card-modern">

  <div class="label">Nome</div>
  <input id="nome" class="input-box" placeholder="Nome completo">

  <div class="label">Telefone</div>
  <input id="telefone" class="input-box" placeholder="Telefone">

  <div class="label">Endereço</div>
  <input id="endereco" class="input-box" placeholder="Endereço">

</div>

<!-- VEÍCULO -->
  <div class="card-modern">

  <div class="label">Veículo</div>

  <input id="marca" class="input-box" placeholder="Marca">

  <input id="modelo" class="input-box" placeholder="Modelo">

  <div class="grid">
    <input id="cor" class="input-box" placeholder="Cor">
    <input id="placa" class="input-box" placeholder="Placa">
  </div>

</div>

</div>

<!-- BOTÃO FIXO -->
<div class="cta-box">
  <button onclick="salvar()">Salvar Motorista</button>
</div>

<script>

/* =========================
SALVAR
========================= */
async function salvar(){

  const data = {
    nome: nome.value.trim(),
    telefone: telefone.value.trim(),
    endereco: endereco.value.trim(),
    marca: marca.value.trim(),
    modelo: modelo.value.trim(),
    cor: cor.value.trim(),
    placa: placa.value.trim()
  };

  if(!data.nome || !data.telefone){
    alert("Nome e telefone obrigatórios");
    return;
  }

  const { error } = await window.supabaseClient
    .from("motoristas")
    .insert([data]);

  if(error){
    console.error(error);
    alert("Erro ao salvar");
    return;
  }

  alert("Motorista cadastrado");

  limpar();
}

/* =========================
LIMPAR
========================= */
function limpar(){
  nome.value = "";
  telefone.value = "";
  endereco.value = "";
  marca.value = "";
  modelo.value = "";
  cor.value = "";
  placa.value = "";
}

</script>

</body>
</html>
