<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Corridas RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background: radial-gradient(circle at top,#0b1220,#020617);
  color:#e5e7eb;
}

/* HEADER */
.header{
  padding:16px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  background:rgba(30,41,59,.8);
  border-bottom:1px solid rgba(255,255,255,.05);
}

/* CONTAINER */
.container{
  padding:16px;
  max-width:800px;
  margin:auto;
}

/* INPUTS */
input, select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.08);
  background:#020617;
  color:#fff;
}

/* BOTÃO */
.btn{
  margin-bottom:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  width:100%;
  font-weight:bold;
}

.refresh{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#000;
}

/* CARD */
.card{
  background:rgba(30,41,59,.6);
  border:1px solid rgba(255,255,255,.05);
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  border-left:5px solid transparent;
}

/* STATUS */
.finalizada{ border-left:5px solid #22c55e; }
.cancelada{ border-left:5px solid #ef4444; }
.nao_atendida{ border-left:5px solid #f59e0b; }

/* LINHAS */
.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}

.motorista{
  font-weight:bold;
  font-size:15px;
}

.grupo{
  font-size:12px;
  background:#020617;
  padding:4px 8px;
  border-radius:8px;
  color:#38bdf8;
}

.rota{
  font-size:13px;
  color:#94a3b8;
  margin-bottom:6px;
}

.valor{
  font-size:20px;
  font-weight:bold;
  color:#22c55e;
  margin-bottom:6px;
}

.info{
  font-size:12px;
  color:#94a3b8;
  display:flex;
  justify-content:space-between;
}

/* FOOTER */
.footer{
  margin-top:8px;
  display:flex;
  gap:6px;
}

.footer button{
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.edit{ background:#3b82f6; color:#fff; }
.delete{ background:#ef4444; color:#fff; }

</style>

</head>

<body>

<div class="header">📊 Corridas RF</div>

<div class="container">

<button class="btn refresh" onclick="carregar()">🔄 Atualizar</button>

<input id="busca" placeholder="Buscar motorista">

<select id="filtroStatus">
  <option value="">Todos</option>
  <option value="finalizada">Finalizadas</option>
  <option value="cancelada">Canceladas</option>
  <option value="nao_atendida">Não atendidas</option>
</select>

<div id="lista"></div>

</div>

<script>

let corridas = [];

async function carregar(){

  const { data, error } = await window.supabaseClient
    .from("corridas")
    .select(`
      *,
      motoristas(nome),
      grupos(nome)
    `)
    .order("data_viagem", { ascending:false });

  if(error){
    console.log(error);
    alert("Erro ao carregar");
    return;
  }

  corridas = data;
  render();
}

/* RENDER */
function render(){

  const lista = document.getElementById("lista");
  const busca = document.getElementById("busca").value.toLowerCase();
  const statusFiltro = document.getElementById("filtroStatus").value;

  lista.innerHTML = "";

  corridas
    .filter(c => {

      const nome = c.motoristas?.nome || "";

      if(busca && !nome.toLowerCase().includes(busca)) return false;
      if(statusFiltro && c.status !== statusFiltro) return false;

      return true;
    })
    .forEach(c => {

      let rota = `${c.origem} → ${c.destino}`;

      if(c.parada){
        rota = `${c.origem} → 🛑 ${c.parada} → ${c.destino}`;
      }

      const div = document.createElement("div");
      div.className = "card " + (c.status || "finalizada");

      div.innerHTML = `
        <div class="topo">
          <div class="motorista">${c.motoristas?.nome || "Sem motorista"}</div>
          <div class="grupo">${c.grupos?.nome || "Sem grupo"}</div>
        </div>

        <div class="rota">${rota}</div>

        <div class="valor">R$ ${Number(c.valor).toFixed(2)}</div>

        <div class="info">
          <span>📅 ${c.data_viagem || "-"}</span>
          <span>🕒 ${c.hora_viagem || "-"}</span>
        </div>

        ${c.taxas ? `<div class="info">💸 Taxas: R$ ${Number(c.taxas).toFixed(2)}</div>` : ""}
        ${c.adicional_noturno ? `<div class="info">🌙 Noturno: R$ ${Number(c.adicional_noturno).toFixed(2)}</div>` : ""}

        <div class="info">
          <strong>Status:</strong> ${c.status || "finalizada"}
        </div>

        <div class="footer">
          <button class="edit" onclick="editar('${c.id}')">Editar</button>
          <button class="delete" onclick="excluir('${c.id}')">Excluir</button>
        </div>
      `;

      lista.appendChild(div);

    });

}

/* EXCLUIR */
async function excluir(id){

  if(!confirm("Excluir corrida?")) return;

  await window.supabaseClient
    .from("corridas")
    .delete()
    .eq("id", id);

  carregar();
}

/* EVENTOS */
busca.oninput = render;
filtroStatus.onchange = render;

/* AUTO REFRESH */
setInterval(carregar, 5000);

carregar();

</script>

</body>
</html>
