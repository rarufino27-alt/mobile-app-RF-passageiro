<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Corridas RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
}

.header{
  padding:15px;
  text-align:center;
  font-weight:bold;
  background:#1e293b;
}

.container{
  padding:15px;
  max-width:700px;
  margin:auto;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #334155;
  background:#020617;
  color:#fff;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.small{
  font-size:13px;
  color:#94a3b8;
}

.btn{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  width:100%;
  font-weight:bold;
}

.edit{
  background:#3b82f6;
  color:#fff;
}

.delete{
  background:#ef4444;
  color:#fff;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

</style>

</head>

<body>

<div class="header">📋 Corridas RF</div>

<div class="container">

<input id="busca" placeholder="Buscar motorista">

<input type="date" id="dataInicio">
<input type="date" id="dataFim">

<div id="lista"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <h3>Editar Corrida</h3>

    <input id="editValor" type="number">
    
    <select id="editStatus">
      <option value="finalizada">Finalizada</option>
      <option value="cancelada">Cancelada</option>
    </select>

    <button class="btn edit" onclick="salvarEdicao()">Salvar</button>

  </div>
</div>

<script>

let corridas = [];
let editId = null;

/* =========================
CARREGAR
========================= */
async function carregar(){

  const { data, error } = await window.supabaseClient
    .from("corridas")
    .select(`
      id,
      valor,
      status,
      data,
      origem,
      destino,
      motoristas(nome)
    `)
    .order("data", { ascending:false });

  if(error){
    console.log(error);
    alert("Erro ao carregar corridas");
    return;
  }

  corridas = data;
  render();

}

/* =========================
RENDER
========================= */
function render(){

  const lista = document.getElementById("lista");
  const busca = document.getElementById("busca").value.toLowerCase();

  const inicio = document.getElementById("dataInicio").value;
  const fim = document.getElementById("dataFim").value;

  lista.innerHTML = "";

  corridas
    .filter(c => {

      const nome = c.motoristas?.nome || "";

      if(busca && !nome.toLowerCase().includes(busca)){
        return false;
      }

      if(inicio && new Date(c.data) < new Date(inicio)){
        return false;
      }

      if(fim && new Date(c.data) > new Date(fim + "T23:59")){
        return false;
      }

      return true;

    })
    .forEach(c => {

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <strong>${c.motoristas?.nome || "Sem motorista"}</strong>

        <div class="small">
          ${c.origem} → ${c.destino}
        </div>

        <div class="small">
          💰 R$ ${c.valor.toFixed(2)}
        </div>

        <div class="small">
          📅 ${new Date(c.data).toLocaleString()}
        </div>

        <div class="small">
          Status: ${c.status}
        </div>

        <button class="btn edit" onclick="abrirEditar('${c.id}', ${c.valor}, '${c.status}')">
          Editar
        </button>

        <button class="btn delete" onclick="excluir('${c.id}')">
          Excluir
        </button>
      `;

      lista.appendChild(div);

    });

}

/* =========================
EDITAR
========================= */
function abrirEditar(id, valor, status){

  editId = id;

  document.getElementById("editValor").value = valor;
  document.getElementById("editStatus").value = status;

  modal.style.display = "flex";

}

async function salvarEdicao(){

  const valor = Number(document.getElementById("editValor").value);
  const status = document.getElementById("editStatus").value;

  const { error } = await window.supabaseClient
    .from("corridas")
    .update({ valor, status })
    .eq("id", editId);

  if(error){
    console.log(error);
    alert("Erro ao editar");
    return;
  }

  modal.style.display = "none";
  carregar();

}

/* =========================
EXCLUIR
========================= */
async function excluir(id){

  if(!confirm("Excluir corrida?")) return;

  await window.supabaseClient
    .from("corridas")
    .delete()
    .eq("id", id);

  carregar();

}

/* =========================
EVENTOS
========================= */
busca.oninput = render;
dataInicio.onchange = render;
dataFim.onchange = render;

/* =========================
START
========================= */
carregar();

</script>

</body>
</html>
