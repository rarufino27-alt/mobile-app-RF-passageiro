<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Corridas RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>

<style>
body{
  font-family:system-ui;
  margin:0;
  background:#111;
  color:#fff;
}

.container{
  padding:15px;
}

h1{
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
}

.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.small{
  font-size:13px;
  opacity:0.7;
}

.btn{
  margin-top:10px;
  padding:8px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.editar{ background:#3b82f6; }
.excluir{ background:#ef4444; }
</style>

</head>

<body>

<div class="container">

<h1>📋 Corridas</h1>

<input id="filtro" placeholder="Buscar por motorista ou grupo">

<div id="lista"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>
  
<script>

function carregar(){

  const data = DataManager.get();
  const lista = document.getElementById("lista");

  const filtro = document.getElementById("filtro").value.toLowerCase();

  lista.innerHTML = "";

  data.corridas
    .slice()
    .reverse()
    .forEach(c => {

      if(filtro &&
        !c.motorista.toLowerCase().includes(filtro) &&
        !c.grupo.toLowerCase().includes(filtro)){
        return;
      }

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="top">
          <span>${c.motorista}</span>
          <span>R$ ${c.valor}</span>
        </div>

        <div>${c.origem} → ${c.destino}</div>

        <div class="small">
          ${c.grupo} | ${c.solicitante}
        </div>

        <div class="small">
          ${c.status === "finalizada" ? "✅ Finalizada" : "❌ Cancelada"}
        </div>

        ${c.status === "cancelada" ? `<div class="small">Motivo: ${c.motivoCancelamento}</div>` : ""}

        <button class="btn editar" onclick="editar(${c.id})">Editar</button>
        <button class="btn excluir" onclick="excluir(${c.id})">Excluir</button>
      `;

      lista.appendChild(div);

    });

}

document.getElementById("filtro").addEventListener("input", carregar);

/* EXCLUIR */
function excluir(id){

  if(!confirm("Excluir essa corrida?")) return;

  const data = DataManager.get();

  data.corridas = data.corridas.filter(c => c.id !== id);

  DataManager.save(data);

  carregar();
}

/* EDITAR */
function editar(id){

  const data = DataManager.get();
  const corrida = data.corridas.find(c => c.id === id);

  const novoMotorista = prompt("Motorista:", corrida.motorista);
  if(novoMotorista === null) return;

  const novoValor = prompt("Valor:", corrida.valor);
  if(novoValor === null) return;

  corrida.motorista = novoMotorista;
  corrida.valor = Number(novoValor);

  DataManager.save(data);

  carregar();
}

carregar();

</script>

</body>
</html>
