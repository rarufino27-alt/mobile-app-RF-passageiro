<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Corridas RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
}

.header{
  padding:15px;
  text-align:center;
  font-weight:bold;
  background:#1e293b;
}

/* RESUMO */
.resumo{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.box{
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  text-align:center;
}

.valor{
  font-size:20px;
  font-weight:bold;
  color:#facc15;
}

.container{
  padding:15px;
  max-width:700px;
  margin:auto;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #334155;
  background:#020617;
  color:#fff;
}

/* CARD */
.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  border-left:5px solid transparent;
}

/* STATUS CORES */
.finalizada{
  border-left:5px solid #22c55e;
}

.cancelada{
  border-left:5px solid #ef4444;
}

.small{
  font-size:13px;
  color:#94a3b8;
}

.valor-card{
  font-size:18px;
  font-weight:bold;
  color:#facc15;
  margin-top:5px;
}

.btn{
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:8px;
  width:100%;
  font-weight:bold;
}

.edit{ background:#3b82f6; color:#fff; }
.delete{ background:#ef4444; color:#fff; }

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

</style>

</head>

<body>

<div class="header">📋 Corridas RF</div>

<!-- RESUMO -->
<div class="resumo">
  <div class="box">
    <div>Total</div>
    <div class="valor" id="totalFaturado">R$ 0</div>
  </div>

  <div class="box">
    <div>Corridas</div>
    <div class="valor" id="totalCorridas">0</div>
  </div>

  <div class="box">
    <div>Canceladas</div>
    <div class="valor" id="totalCanceladas">0</div>
  </div>

  <div class="box">
    <div>Média</div>
    <div class="valor" id="media">R$ 0</div>
  </div>
</div>

<div class="container">

<input id="busca" placeholder="Buscar motorista">

<input type="date" id="dataInicio">
<input type="date" id="dataFim">

<div id="lista"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <h3>Editar Corrida</h3>

    <input id="editValor" type="number">
    <input id="editHora" type="time">

    <select id="editStatus">
      <option value="finalizada">Finalizada</option>
      <option value="cancelada">Cancelada</option>
    </select>

    <button class="btn edit" onclick="salvarEdicao()">Salvar</button>

  </div>
</div>

<script>

let corridas = [];
let editId = null;

/* =========================
CARREGAR
========================= */
async function carregar(){

  const { data } = await window.supabaseClient
    .from("corridas")
    .select(`*, motoristas(nome)`)
    .order("data", { ascending:false });

  corridas = data;
  calcularResumo();
  render();

}

/* =========================
RESUMO
========================= */
function calcularResumo(){

  let total = 0;
  let canceladas = 0;

  corridas.forEach(c => {

    if(c.status === "finalizada"){
      total += c.valor;
    }else{
      canceladas++;
    }

  });

  const media = corridas.length ? total / corridas.length : 0;

  totalFaturado.innerText = "R$ " + total.toFixed(2);
  totalCorridas.innerText = corridas.length;
  totalCanceladas.innerText = canceladas;
  media.innerText = "R$ " + media.toFixed(2);

}

/* =========================
RENDER
========================= */
function render(){

  const lista = document.getElementById("lista");
  const busca = document.getElementById("busca").value.toLowerCase();

  lista.innerHTML = "";

  corridas
    .filter(c => (c.motoristas?.nome || "").toLowerCase().includes(busca))
    .forEach(c => {

      let rota = `${c.origem} → ${c.destino}`;

      if(c.parada){
        rota = `${c.origem} → 🛑 ${c.parada} → ${c.destino}`;
      }

      const classeStatus = c.status === "cancelada"
        ? "cancelada"
        : "finalizada";

      const div = document.createElement("div");
      div.className = "card " + classeStatus;

      div.innerHTML = `
        <strong>${c.motoristas?.nome || "Sem motorista"}</strong>

        <div class="small">${rota}</div>

        <div class="valor-card">R$ ${c.valor.toFixed(2)}</div>

        <div class="small">
          🕒 ${c.hora_viagem || "-"} | 📅 ${new Date(c.data).toLocaleDateString()}
        </div>

        <div class="small">Status: ${c.status || "finalizada"}</div>

        <button class="btn edit"
          onclick="abrirEditar('${c.id}', ${c.valor}, '${c.status}', '${c.hora_viagem || ""}')">
          Editar
        </button>

        <button class="btn delete" onclick="excluir('${c.id}')">
          Excluir
        </button>
      `;

      lista.appendChild(div);

    });

}

/* =========================
EDITAR
========================= */
function abrirEditar(id, valor, status, hora){

  editId = id;

  editValor.value = valor;
  editStatus.value = status || "finalizada";
  editHora.value = hora;

  modal.style.display = "flex";

}

async function salvarEdicao(){

  const valor = Number(editValor.value);
  const status = editStatus.value;
  const hora = editHora.value;

  await window.supabaseClient
    .from("corridas")
    .update({
      valor,
      status,
      hora_viagem: hora
    })
    .eq("id", editId);

  modal.style.display = "none";
  carregar();

}

/* =========================
EXCLUIR
========================= */
async function excluir(id){

  if(!confirm("Excluir corrida?")) return;

  await window.supabaseClient
    .from("corridas")
    .delete()
    .eq("id", id);

  carregar();

}

/* =========================
EVENTOS
========================= */
busca.oninput = render;

/* =========================
START
========================= */
carregar();

</script>

</body>
</html>
